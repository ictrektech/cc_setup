<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Room</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <aside class="rail">
      <div class="brand">
        <div class="mark">C</div>
        <div>
          <strong>Agent Room</strong>
          <span>Claude agent 编排台</span>
        </div>
      </div>

      <section class="panel launch-panel">
        <div class="panel-head">
          <span>新建房间</span>
          <b id="commandBadge">检测中</b>
        </div>
        <form id="launchForm" class="launch">
          <label>
            项目目录
            <input id="cwd" name="cwd" autocomplete="off" placeholder="/home/jhu/dev/repos/project" />
          </label>
          <label>
            任务指令
            <textarea id="prompt" name="prompt" rows="5" placeholder="描述你希望 Claude 做什么"></textarea>
          </label>
          <button id="launchBtn" type="submit">启动 agent</button>
        </form>
      </section>

      <section class="project-stack">
        <div class="section-title">项目</div>
        <button class="project active" type="button">
          <span>当前项目</span>
          <strong id="projectName">未选择</strong>
        </button>
        <button class="project" type="button">
          <span>Agent 类型</span>
          <strong>Claude agent</strong>
        </button>
      </section>
    </aside>

    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">ROOM OVERVIEW</p>
          <h1>Agent 工作间</h1>
        </div>
        <div class="top-actions">
          <button id="themeBtn" class="ghost" type="button">浅色</button>
          <div class="stats">
            <div><span id="runningCount">0</span><b>运行中</b></div>
            <div><span id="doneCount">0</span><b>已结束</b></div>
            <div><span id="totalCount">0</span><b>会话</b></div>
          </div>
        </div>
      </header>

      <section class="room-grid" id="sessionList"></section>

      <section class="workbench">
        <div class="terminal-panel">
          <div class="terminal-head">
            <div>
              <strong id="activeTitle">还没有会话</strong>
              <span id="activeMeta">选择项目目录，启动一个 Claude agent</span>
              <em id="runStatus">空闲</em>
            </div>
            <div class="actions">
              <button id="chatTab" class="ghost active" type="button">对话</button>
              <button id="rawTab" class="ghost" type="button">Raw</button>
              <button id="clearBtn" class="ghost" type="button" disabled>清屏</button>
              <button id="stopBtn" class="danger" type="button" disabled>停止</button>
            </div>
          </div>
          <section id="stream" class="stream" aria-label="agent 对话" tabindex="0"></section>
          <pre id="terminal" aria-label="agent 原始输出" tabindex="0" hidden></pre>
        </div>

        <aside class="inspector">
          <div class="section-title">当前房间</div>
          <dl>
            <dt>状态</dt>
            <dd id="inspectStatus">空闲</dd>
            <dt>命令</dt>
            <dd id="inspectCommand">-</dd>
            <dt>目录</dt>
            <dd id="inspectCwd">-</dd>
          </dl>
          <form id="composer" class="composer">
            <textarea id="message" rows="6" placeholder="给当前 agent 发送下一条指令" disabled></textarea>
            <button id="sendBtn" type="submit" disabled>发送</button>
          </form>
        </aside>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
