# =============================================================================
# Agent Room — VOS 应用定义包源文件
# =============================================================================
# 打包:
#   cd src/ && tar czf ../dist/app.tar.gz manifest.yml docker-compose.yml \
#     configs.yml routers.yml icon.png README.zh-CN.md
# =============================================================================

id: com.ictrek.agent-room
name:
  zh-CN: Agent Room
  en: Agent Room
description:
  zh-CN: Claude / Codex AI Agent 远程管理控制台，通过 Web 浏览器创建、监控和管理 AI Agent 会话。
  en: A remote web console for managing Claude / Codex AI agent sessions.
version: __APP_VERSION__
author: ICTrek
category: [ai]
arch: [amd64, arm64]

platform:
  version: ">=3.0.0"

profiles:
  - name: amd
    title:
      zh-CN: AMD64
      en: AMD64
    description:
      zh-CN: x86_64 / AMD64 平台，使用 AMD_with_cuda 发布表中的 Agent Room 镜像。
      en: x86_64 / AMD64 platform, using the Agent Room image from the AMD_with_cuda sheet.
    conflicts: [arm]
  - name: arm
    title:
      zh-CN: ARM64
      en: ARM64
    description:
      zh-CN: ARM64 平台，使用 ARM_with_cuda 发布表中的 Agent Room 镜像。
      en: ARM64 platform, using the Agent Room image from the ARM_with_cuda sheet.
    conflicts: [amd]

storage:
  directories:
    - path: data
      mode: "0755"
    - path: config
      uid: 1000
      gid: 1000
      mode: "0700"
    - path: workspace
      mode: "0755"
