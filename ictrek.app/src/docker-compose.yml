x-agent-room-base: &agent-room-base
  restart: unless-stopped
  networks:
    - vos_default
  ports:
    - "${AGENT_ROOM_PORT:-6004}:6004"
  environment:
    - PORT=6004
    - AGENTROOM_TOKEN=${AGENT_ROOM_TOKEN:-}
    - AGENTROOM_AUTH_DIR=/app/storage/config
    - AGENTROOM_SESSIONS_PATH=/app/storage/data/sessions.json
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
    - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
    - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-5-20250610}
    - ANTHROPIC_HAIKU_MODEL=${ANTHROPIC_HAIKU_MODEL:-claude-haiku-4-5-20251001}
    - AGENTROOM_WORKSPACE_DIR=/workspace
    - DISABLE_TELEMETRY=1
    - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
  volumes:
    - ${AGENT_ROOM_DATA_PATH:-/data/vos_workspace/agentroom/data}:/app/storage/data
    - ${AGENT_ROOM_CONFIG_PATH:-/data/vos_workspace/agentroom/config}:/app/storage/config
    - ${AGENT_ROOM_WORKSPACE_PATH:-/data/vos_workspace/agentroom/workspace}:/workspace
  labels:
    - "traefik.enable=true"
    - "traefik.docker.network=vos_default"
    - "traefik.http.routers.agent-room-web.rule=PathPrefix(`/app/com.ictrek.agent-room`)"
    - "traefik.http.routers.agent-room-web.service=agent-room-web"
    - "traefik.http.routers.agent-room-web.middlewares=agent-room-web-slash,agent-room-web-strip"
    - "traefik.http.middlewares.agent-room-web-slash.redirectregex.regex=^(.*)/app/com\\.ictrek\\.agent-room$"
    - "traefik.http.middlewares.agent-room-web-slash.redirectregex.replacement=$${1}/app/com.ictrek.agent-room/"
    - "traefik.http.middlewares.agent-room-web-slash.redirectregex.permanent=true"
    - "traefik.http.middlewares.agent-room-web-strip.stripprefix.prefixes=/app/com.ictrek.agent-room"
    - "traefik.http.services.agent-room-web.loadbalancer.server.port=6004"

services:
  agent-room-arm:
    <<: *agent-room-base
    profiles: ["arm"]
    image: ${AGENT_ROOM_ARM_IMAGE}
    pull_policy: always

  agent-room-amd:
    <<: *agent-room-base
    profiles: ["amd"]
    image: ${AGENT_ROOM_AMD_IMAGE}
    pull_policy: always

networks:
  vos_default:
    external: true
